<main class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="brand-logo">F</div>
      <h1>Fila-Zero</h1>
      <p class="subtitle">Panel de Administración</p>
    </div>

    <form (submit)="onSubmit($event)" class="login-form">
      @if (errorMessage()) {
        <div class="alert alert-danger" role="alert">
          <span>⚠️</span> {{ errorMessage() }}
        </div>
      }

      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          id="username" 
          type="text" 
          name="username"
          [ngModel]="username()" 
          (ngModelChange)="username.set($event)"
          placeholder="Ingresa tu usuario (opcional)" 
          [disabled]="isLoading()"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          name="password"
          [ngModel]="password()" 
          (ngModelChange)="password.set($event)"
          placeholder="•••••••• (opcional)" 
          [disabled]="isLoading()"
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span> Iniciando sesión...
        } @else {
          Iniciar Sesión
        }
      </button>
    </form>

    <div class="login-footer">
      <p>💡 Modo prototipo: Puedes hacer clic directamente en "Iniciar Sesión" para entrar.</p>
    </div>
  </div>
</main>
